<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - NUDELPA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .contenedor { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .titulo { color: #e60000; font-weight: bold; font-size: 24px; margin-bottom: 20px; }
        
        /* Estilos de los botones */
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-rojo { background-color: #e60000; color: white; }
        .btn-rojo:hover { background-color: #cc0000; }
        .btn-gris { background-color: #555; color: white; }
        .btn-gris:hover { background-color: #333; }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="titulo">NUDELPA LTDA.</div>
        <h2>Menú Principal</h2>
        <p>Seleccione una opción:</p>
        
        <a href="/formulario_completo" class="btn btn-rojo">1. Crear Control de Producción</a>
        
        <a href="#" class="btn btn-gris">2. Ver Historial de Turnos</a>
        <a href="#" class="btn btn-gris">3. Generar Reporte Excel OEE</a>
    </div>

</body>
</html>
