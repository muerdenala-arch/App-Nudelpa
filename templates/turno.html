<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Producción - NUDELPA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .contenedor { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #e60000; color: white; padding: 14px 20px; margin: 8px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>F-GP-005: Nuevo Turno</h2>
        <form action="/guardar_turno" method="POST">
            
            <label>Fecha:</label>
            <input type="date" name="fecha" required>

            <label>Hora Inicial de Turno:</label>
            <input type="time" name="hora_inicial" required>

            <label>Hora Final de Turno:</label>
            <input type="time" name="hora_final" required>

            <label>Línea:</label>
            <select name="linea">
                <option value="Vidrio">Vidrio</option>
                <option value="PET">PET</option>
                <option value="Lata">Lata</option>
            </select>

            <label>Grupo:</label>
            <input type="text" name="grupo" placeholder="Ej: L: 27/03/26 16:34" required>

            <label>Supervisor de Producción:</label>
            <input type="text" name="supervisor_prod" required>

            <button type="submit">Guardar Cabecera de Turno</button>
        </form>
    </div>

</body>
</html>
